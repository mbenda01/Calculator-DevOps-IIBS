input {
  # Écoute les logs envoyés en TCP depuis le conteneur calculatrice
  tcp {
    port  => 5000
    codec => json_lines
  }
  # Écoute aussi en UDP
  udp {
    port  => 5000
    codec => json_lines
  }
}

filter {
  # Extraction de l'opération et du résultat depuis le message
  if [message] =~ /Resultat/ {
    grok {
      match => {
        "message" => "OP=%{WORD:operation} A=%{NUMBER:operand_a:float} B=%{NUMBER:operand_b:float} Resultat : %{NUMBER:result:float}"
      }
    }
    mutate { add_field => { "log_type" => "result" } }
  } else if [message] =~ /Erreur/ {
    grok {
      match => {
        "message" => "OP=%{WORD:operation} A=%{NUMBER:operand_a:float} B=%{NUMBER:operand_b:float} %{GREEDYDATA:error_msg}"
      }
    }
    mutate { add_field => { "log_type" => "error" } }
  } else {
    mutate { add_field => { "log_type" => "info" } }
  }

  # Ajoute un timestamp ISO8601 lisible
  date {
    match    => ["timestamp", "ISO8601"]
    target   => "@timestamp"
    timezone => "UTC"
  }

  # Supprime le champ brut host (redondant)
  mutate { remove_field => ["host"] }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "calculator-logs-%{+YYYY.MM.dd}"
  }
  # Debug local (désactiver en prod)
  stdout {
    codec => rubydebug
  }
}
