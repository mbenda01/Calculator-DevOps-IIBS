# elk/logstash/pipeline/calculator.conf
# Pipeline Logstash — Capture des logs de java-calculator

input {
  # Réception des logs depuis le conteneur java-calculator via TCP
  tcp {
    port  => 5000
    codec => plain { charset => "UTF-8" }
    tags  => ["calculator"]
  }

  # Alternative : entrée Beats (si Filebeat est utilisé)
  beats {
    port => 5044
  }
}

filter {
  # ── Parsing des logs de la calculatrice ──────────────────

  # Log de résultat réussi : "Resultat : 15.0"
  if [message] =~ /^Resultat :/ {
    grok {
      match => {
        "message" => "Resultat : %{NUMBER:resultat:float}"
      }
    }
    mutate {
      add_field => { "log_type" => "success" }
    }
  }

  # Log d'erreur : "Erreur : Division par zéro impossible"
  else if [message] =~ /^Erreur :/ {
    grok {
      match => {
        "message" => "Erreur : %{GREEDYDATA:erreur_message}"
      }
    }
    mutate {
      add_field => { "log_type" => "error" }
    }

    # Tag spécifique pour division par zéro
    if [message] =~ /zéro/ {
      mutate {
        add_tag => ["division_par_zero"]
        add_field => { "erreur_type" => "division_par_zero" }
      }
    }
  }

  # ── Détection de l'opérateur depuis les args ──────────────
  # Si le conteneur est lancé avec des arguments loggués
  if [message] =~ /\+/ {
    mutate { add_field => { "operateur" => "addition" } }
  } else if [message] =~ / - / {
    mutate { add_field => { "operateur" => "soustraction" } }
  } else if [message] =~ /\*/ {
    mutate { add_field => { "operateur" => "multiplication" } }
  } else if [message] =~ /\// {
    mutate { add_field => { "operateur" => "division" } }
  }

  # ── Ajout d'un timestamp propre ──────────────────────────
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  mutate {
    add_field => { "application" => "java-calculator" }
    add_field => { "environnement" => "production" }
  }
}

output {
  # Envoi vers Elasticsearch
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "calculator-logs-%{+YYYY.MM.dd}"
    action   => "index"
  }

  # Debug en console (à désactiver en production)
  stdout {
    codec => rubydebug
  }
}