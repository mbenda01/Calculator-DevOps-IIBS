input {
  file {
    path => "/usr/share/logstash/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "tail"
    codec => plain {
      charset => "UTF-8"
    }
  }
}

filter {
  if [message] =~ /^CALC_EVENT / {
    mutate {
      gsub => ["message", "^CALC_EVENT ", ""]
    }

    json {
      source => "message"
      tag_on_failure => ["_calculator_json_parse_failure"]
    }

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    mutate {
      remove_field => ["message", "event", "host", "log", "path", "@version"]
    }
  } else {
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "calculator-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
