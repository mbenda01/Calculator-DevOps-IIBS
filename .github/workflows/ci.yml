name: CI/CD Pipeline — Calculator DevOps

on:
  push:
    branches:
      - '**'          # déclenche sur toute branche poussée
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Build, Test, Package (Maven)
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Java 17 / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven          # met en cache ~/.m2 automatiquement

      - name: Compilation
        run: mvn compile --batch-mode

      - name: Exécution des tests JUnit 5
        run: mvn test --batch-mode

      - name: Publication du rapport de tests
        uses: actions/upload-artifact@v4
        if: always()            # publie même en cas d'échec
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Packaging (génération du JAR)
        run: mvn package --batch-mode -DskipTests

      - name: Publication du JAR
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: target/calculator-1.0.jar

  # ─────────────────────────────────────────────
  # JOB 2 : Package & Publication Nexus (UC-010)
  # Déclenché uniquement sur main ou develop
  # après la réussite du Job 1
  # ─────────────────────────────────────────────
  publish-nexus:
    name: Package & Publish to Nexus
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    env:
      NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      NEXUS_URL: ${{ secrets.NEXUS_URL }}
      NEXUS_SNAPSHOT_URL: ${{ secrets.NEXUS_SNAPSHOT_URL }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package du JAR
        run: mvn package --batch-mode -DskipTests

      - name: Publication sur Nexus (mvn deploy)
        run: |
          mvn deploy --batch-mode -DskipTests \
            --settings .github/maven/settings.xml

      - name: Publication du JAR en artifact GitHub
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar-nexus
          path: target/calculator-1.0.jar

  # ─────────────────────────────────────────────
  # JOB 3 : Build & Push image Docker
  # Déclenché uniquement sur main ou develop
  # ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Génération du JAR (nécessaire pour le Docker build)
        run: mvn package --batch-mode -DskipTests

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/calculator-devops
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build & Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
