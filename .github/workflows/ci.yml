name: CI/CD Calculator DevOps

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  APP_VERSION: 1.0.${{ github.run_number }}-SNAPSHOT
  JAR_FILE: target/calculator-devops.jar
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/calculator-devops
  DOCKER_IMAGE_VERSION: v1.0
  DOCKER_IMAGE_RUN_TAG: 1.0.${{ github.run_number }}
  DOCKER_IMAGE_SHA_TAG: sha-${{ github.sha }}

jobs:
  build-and-test:
    name: Job 1 - Compile And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile Maven project
        run: mvn -B -Drevision="${APP_VERSION}" clean compile

      - name: Run Maven tests
        run: mvn -B -Drevision="${APP_VERSION}" test

  publish-jar:
    name: Job 2 - Package And Publish Jar To Nexus
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    env:
      NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      NEXUS_SNAPSHOT_URL: ${{ secrets.NEXUS_SNAPSHOT_URL }}
      NEXUS_RELEASE_URL: ${{ secrets.NEXUS_RELEASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate Nexus secrets
        run: |
          test -n "${NEXUS_USERNAME}" || (echo "Missing NEXUS_USERNAME secret" && exit 1)
          test -n "${NEXUS_PASSWORD}" || (echo "Missing NEXUS_PASSWORD secret" && exit 1)
          test -n "${NEXUS_SNAPSHOT_URL}" || (echo "Missing NEXUS_SNAPSHOT_URL secret" && exit 1)

      - name: Package executable jar
        run: mvn -B -Drevision="${APP_VERSION}" -DskipTests clean package

      - name: Upload jar as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar-${{ github.run_number }}
          path: ${{ env.JAR_FILE }}

      - name: Configure Maven settings for Nexus
        run: |
          mkdir -p "${HOME}/.m2"
          cat > "${HOME}/.m2/settings.xml" <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy jar to Nexus
        run: mvn -B -Drevision="${APP_VERSION}" -DskipTests deploy

  docker-image:
    name: Job 3 - Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate DockerHub secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "Missing DOCKERHUB_USERNAME secret" && exit 1)
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || (echo "Missing DOCKERHUB_TOKEN secret" && exit 1)

      - name: Package executable jar
        run: mvn -B -Drevision="${APP_VERSION}" -DskipTests package

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            JAR_FILE=${{ env.JAR_FILE }}
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_VERSION }}
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_RUN_TAG }}
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_SHA_TAG }}

  runtime-validation:
    name: Job 4 - Deploy Validation
    runs-on: ubuntu-latest
    needs:
      - publish-jar
      - docker-image
    if: github.event_name == 'push'

    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker image from DockerHub
        run: docker pull "${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_SHA_TAG}"

      - name: Run Docker image and assert calculator result
        run: |
          docker run --rm "${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_SHA_TAG}" 10 '+' 5 | tee container-output.log
          grep -q "Resultat : 15.0" container-output.log
