# .github/workflows/ci.yml
name: CI/CD Pipeline - Calculator DevOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/java-calculator
  DOCKER_TAG: v1.0

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — CI : Compilation + Tests
  # ─────────────────────────────────────────────
  ci-test:
    name: "Job 1 — CI (Compile & Test)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilation Maven
        run: mvn compile --no-transfer-progress

      - name: Exécution des tests JUnit 5
        run: mvn test --no-transfer-progress

      - name: Publication du rapport de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — Package & Publication sur Nexus
  # ─────────────────────────────────────────────
  package-nexus:
    name: "Job 2 — Package & Nexus"
    runs-on: ubuntu-latest
    needs: ci-test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Packaging du .jar (sans re-lancer les tests)
        run: mvn package -DskipTests --no-transfer-progress

      - name: Configuration du settings.xml Maven pour Nexus
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "nexus-releases",
              "username": "${{ secrets.NEXUS_USERNAME }}",
              "password": "${{ secrets.NEXUS_PASSWORD }}"
            }]

      - name: Debug — Vérification NEXUS_URL
        run: |
          if [ -z "${{ secrets.NEXUS_URL }}" ]; then
            echo "❌ NEXUS_URL est vide ou non défini !"
            exit 1
          else
            echo "✅ NEXUS_URL est défini"
          fi

      - name: Publication du .jar sur Nexus
        run: |
          mvn deploy -DskipTests --no-transfer-progress \
            -DaltDeploymentRepository=nexus-releases::default::${{ secrets.NEXUS_URL }}/repository/maven-releases/

      - name: Sauvegarde du .jar pour les jobs suivants
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: target/calculator-1.0.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3 — Build & Push image Docker sur DockerHub
  # ─────────────────────────────────────────────
  docker-build-push:
    name: "Job 3 — Docker Build & Push"
    runs-on: ubuntu-latest
    needs: ci-test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Packaging du .jar
        run: mvn package -DskipTests --no-transfer-progress

      - name: Login sur DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build de l'image Docker
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
                     ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Push de l'image sur DockerHub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Résumé de l'image publiée
        run: |
          echo "✅ Image publiée : ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
          echo "✅ Image publiée : ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

  # ─────────────────────────────────────────────
  # JOB 4 — Deploy : Validation de l'image déployée
  # ─────────────────────────────────────────────
  deploy-validate:
    name: "Job 4 — Deploy & Validation"
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Login sur DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull de l'image depuis DockerHub
        run: docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

      - name: Test — Addition (10 + 5)
        run: |
          RESULT=$(docker run --rm ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} 10 + 5)
          echo "Résultat : $RESULT"
          echo "$RESULT" | grep -q "15.0" && echo "✅ Test addition OK" || (echo "❌ Test addition ÉCHOUÉ" && exit 1)

      - name: Test — Soustraction (20 - 8)
        run: |
          RESULT=$(docker run --rm ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} 20 - 8)
          echo "Résultat : $RESULT"
          echo "$RESULT" | grep -q "12.0" && echo "✅ Test soustraction OK" || (echo "❌ Test soustraction ÉCHOUÉ" && exit 1)

      - name: Test — Multiplication (8 '*' 4)
        run: |
          RESULT=$(docker run --rm ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} 8 '*' 4)
          echo "Résultat : $RESULT"
          echo "$RESULT" | grep -q "32.0" && echo "✅ Test multiplication OK" || (echo "❌ Test multiplication ÉCHOUÉ" && exit 1)

      - name: Test — Division par zéro (10 / 0)
        run: |
          RESULT=$(docker run --rm ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} 10 / 0 || true)
          echo "Résultat : $RESULT"
          echo "$RESULT" | grep -q "zéro" && echo "✅ Test division par zéro OK" || (echo "❌ Test division par zéro ÉCHOUÉ" && exit 1)

      - name: Résumé du déploiement
        run: |
          echo "🚀 Déploiement validé avec succès !"
          echo "Image : ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
          echo "Commit : ${{ github.sha }}"