name: CI/CD Calculator Java

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean package

      - name: Run tests
        run: mvn test

      - name: Rename JAR for Docker
        run: mv target/devops-1.0-SNAPSHOT.jar target/calculator.jar

      - name: Upload artifact for Docker job
        uses: actions/upload-artifact@v4   # <- ici, on passe en v4
        with:
          name: calculator-jar
          path: target/calculator.jar

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download artifact
        uses: actions/download-artifact@v4  # <- ici aussi, v4
        with:
          name: calculator-jar
          path: target

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-calculator:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-calculator:latest